version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stockflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockflow}
      POSTGRES_USER: ${POSTGRES_USER:-stockflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockflow123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockflow} -d ${POSTGRES_DB:-stockflow}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - stockflow_net

  redis:
    image: redis:7-alpine
    container_name: stockflow_redis
    restart: unless-stopped
    networks:
      - stockflow_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: stockflow_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockflow}:${POSTGRES_PASSWORD:-stockflow123}@postgres:5432/${POSTGRES_DB:-stockflow}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production_min32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: "*"
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: stockflow_web
    restart: unless-stopped
    environment:
      # Vite exposes env vars with VITE_ prefix
      VITE_API_URL: http://localhost:3001/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - stockflow_net

volumes:
  postgres_data:

networks:
  stockflow_net:
    driver: bridge
